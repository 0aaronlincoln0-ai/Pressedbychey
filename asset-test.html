<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pressed by Chey Asset Test</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: #ffe1ed;
        color: #241018;
        font-family: Arial, sans-serif;
      }
      h1 {
        margin-top: 0;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 16px;
      }
      figure {
        margin: 0;
        padding: 12px;
        border: 1px solid rgba(143, 29, 81, 0.18);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.72);
      }
      img {
        width: 100%;
        aspect-ratio: 1;
        object-fit: cover;
        border-radius: 6px;
        background: white;
      }
      figcaption {
        margin-top: 8px;
        font-weight: 700;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <h1>Pressed by Chey image test</h1>
    <p>If these images show here, Netlify has the image files. If they do not, the upload did not include the full website package.</p>
    <div class="grid">
      <figure><img src="pressed-by-chey-logo-transparent.png" alt=""><figcaption>pressed-by-chey-logo-transparent.png</figcaption></figure>
      <figure><img src="pink-press-on-hero.png" alt=""><figcaption>pink-press-on-hero.png</figcaption></figure>
      <figure><img src="rose-mirror-muse.png" alt=""><figcaption>rose-mirror-muse.png</figcaption></figure>
      <figure><img src="berry-aura-glaze.png" alt=""><figcaption>berry-aura-glaze.png</figcaption></figure>
      <figure><img src="ribbon-crush.png" alt=""><figcaption>ribbon-crush.png</figcaption></figure>
      <figure><img src="pink-cat-eye-flash.png" alt=""><figcaption>pink-cat-eye-flash.png</figcaption></figure>
      <figure><img src="custom-builder-premium.png" alt=""><figcaption>custom-builder-premium.png</figcaption></figure>
      <figure><img src="ai-try-on-hand.png" alt=""><figcaption>ai-try-on-hand.png</figcaption></figure>
    </div>
  </body>
</html>
