[build]
  publish = "."
  command = ""

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=300"
